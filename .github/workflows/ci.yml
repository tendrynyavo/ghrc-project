# .github/workflows/ci.yml

name: CI Pipeline          # Name shown in GitHub UI

on:                        # WHEN does this run?
  push:                    # On every push...
    branches: ["**"]       # ...to any branch
  pull_request:            # Also on pull requests
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm start &
      - run: npm test

  build-and-push:
    runs-on: ubuntu-latest
    needs: test                           # Only runs if tests pass
    if: github.ref == 'refs/heads/main'  # Only on main branch

    permissions:
      contents: read
      packages: write                    # Required to push to GHCR

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}  # Auto-provided, no setup needed!

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Extract metadata for image tags (latest, git SHA, branch name)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-          # e.g. sha-abc1234
            type=raw,value=latest         # always tag as latest too

      # Build the image and push it to GHCR
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha            # Use GitHub Actions cache for layers
          cache-to: type=gha,mode=max