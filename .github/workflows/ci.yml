# .github/workflows/ci.yml

name: CI Pipeline          # Name shown in GitHub UI

on:                        # WHEN does this run?
  push:                    # On every push...
    branches: ["**"]       # ...to any branch
  pull_request:            # Also on pull requests
    branches: [main]

jobs:
  build-and-test:          # Job name (you choose this)
    runs-on: ubuntu-latest # Which OS to use (a fresh VM each time)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4      # Built-in action: clones your repo

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install               # Plain shell command

      # - name: Run linter
      #   run: npm run lint

      - name: Run tests
        run: npm test

      # - name: Build
      #   run: npm run build